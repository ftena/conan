on:
  push:
  pull_request:

jobs:
  conan_cmake_lib:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        uses: conan-io/setup-conan@v1

      - name: Conan Create
        run: |
          cd recipes/cmake_lib
          conan create . 

  conan_date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        uses: conan-io/setup-conan@v1

      - name: Conan Create
        run: |
          cd recipes/date
          conan create . --version=3.0.1 --user=ftena --channel=main \
          -pr:h=../../profiles/gcc11_cxx14_release \
          -pr:b=../../profiles/gcc11_cxx14_release --build=missing
  
  conan_date_onlyheader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        uses: conan-io/setup-conan@v1

      - name: Conan Create
        run: |
          cd recipes/date-onlyheader
          conan create . --version=3.0.1 --user=ftena --channel=main \
          -pr:h=../../profiles/gcc11_cxx14_release \
          -pr:b=../../profiles/gcc11_cxx14_release

  conan_spdlog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Conan
        uses: conan-io/setup-conan@v1

      - name: Conan Create
        run: |
          cd recipes/spdlog
          conan create . --version=1.11.0 --user=ftena --channel=main \
          -pr:h=../../profiles/gcc11_cxx14_release \ 
          -pr:b=../../profiles/gcc11_cxx14_release
